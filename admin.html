<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel · Belleza Farmasi</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Karla:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body class="admin-body">

<!-- Pantalla de acceso -->
<div class="admin-login" id="adminLogin">
  <div class="admin-login-card">
    <span class="brand-mark big">✿</span>
    <h1>Panel de la tienda</h1>
    <p class="modal-sub">Acceso solo para la administradora.</p>
    <div class="field"><label for="admEmail">Correo</label><input id="admEmail" type="email" autocomplete="email"></div>
    <div class="field"><label for="admPass">Contraseña</label><input id="admPass" type="password" autocomplete="current-password"></div>
    <p class="auth-error" id="admError" hidden></p>
    <button class="btn solid wide" id="admEnter">Entrar</button>
    <p class="foot-note">La primera vez, toca «Entrar» y se creará tu cuenta con el correo configurado.</p>
  </div>
</div>

<!-- Panel -->
<div class="admin" id="adminPanel" hidden>
  <header class="admin-top">
    <div>
      <h1>Mis pedidos 💗</h1>
      <p class="admin-sub" id="admWho"></p>
    </div>
    <button class="btn ghost small" id="admLogout">Salir</button>
  </header>

  <nav class="admin-tabs">
    <button class="atab active" data-tab="pedidos">Pedidos <span class="n" id="nPedidos"></span></button>
    <button class="atab" data-tab="clientes">Clientes <span class="n" id="nClientes"></span></button>
  </nav>

  <!-- Pedidos -->
  <section id="tabPedidos">
    <div class="chips admin-chips" id="estadoChips"></div>
    <div class="admin-list" id="ordersList"><p class="muted center">Cargando pedidos…</p></div>
  </section>

  <!-- Clientes -->
  <section id="tabClientes" hidden>
    <div class="admin-list" id="usersList"><p class="muted center">Cargando clientes…</p></div>
  </section>
</div>

<div class="toast" id="toast" hidden></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="config.js"></script>
<script src="admin.js"></script>
</body>
</html>
